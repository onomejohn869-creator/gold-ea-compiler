name: compile

on: push

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download MetaTrader 5 installer
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile "mt5setup.exe"

      - name: Install MetaTrader 5 silently
        shell: pwsh
        run: |
          Start-Process -FilePath ".\mt5setup.exe" -ArgumentList "/auto","/path:C:\mt5" -Wait

      - name: Verify MetaEditor was installed
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\mt5\metaeditor64.exe")) {
            Write-Error "metaeditor64.exe not found after install!"
            exit 1
          }
          Write-Host "MetaEditor found at C:\mt5\metaeditor64.exe"

      - name: Launch terminal once to populate MQL5 folder structure
        shell: pwsh
        run: |
          Start-Process -FilePath "C:\mt5\terminal64.exe" -ArgumentList "/portable"
          Start-Sleep -Seconds 30
          Get-Process terminal64 -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Sleep -Seconds 3

      - name: Verify standard library exists
        shell: pwsh
        run: |
          $tradeInclude = "C:\mt5\MQL5\Include\Trade\Trade.mqh"
          if (-not (Test-Path $tradeInclude)) {
            Write-Warning "Trade.mqh not found yet at $tradeInclude - listing what's there:"
            Get-ChildItem "C:\mt5\MQL5" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 30 FullName
          } else {
            Write-Host "Found standard library at $tradeInclude"
          }

      - name: Compile EA
        shell: pwsh
        run: |
          $ea = "$(Get-Location)\XAUUSD_EMA_RSI_ATR_EA.mq5"
          $log = "$(Get-Location)\compile.log"
          Write-Host "Compiling: $ea"

          $proc = Start-Process -FilePath "C:\mt5\metaeditor64.exe" `
            -ArgumentList "/compile:`"$ea`"", "/inc:`"C:\mt5\MQL5\Include`"", "/log:`"$log`"" `
            -NoNewWindow -Wait -PassThru

          Write-Host "MetaEditor exit code: $($proc.ExitCode)"

          if (Test-Path $log) {
            Get-Content $log
          } else {
            Write-Error "compile.log was not created - MetaEditor likely failed to launch."
            exit 1
          }

      - name: Fail the job if the log shows errors
        shell: pwsh
        run: |
          if (Select-String -Path compile.log -Pattern "error" -Quiet) {
            Write-Error "Compilation reported errors — see log above."
            exit 1
          }
          Write-Host "Compilation succeeded."

      - name: Upload compiled EA + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ea
          path: |
            *.ex5
            compile.log
